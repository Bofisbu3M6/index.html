<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bofisbu.shopfile.site | v5.2 Persistent Balance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap');
        body { font-family: 'Lexend', sans-serif; background-color: #0b1120; color: #e2e8f0; overflow-x: hidden; }
        .sidebar { width: 220px; background: #0f172a; height: 100vh; position: fixed; left: 0; top: 0; border-right: 1px solid #1e293b; z-index: 100; transition: 0.3s; display: flex; flex-direction: column; }
        .sidebar.closed { left: -220px; }
        .main-content { margin-left: 220px; padding: 20px; transition: 0.3s; }
        .main-content.full { margin-left: 0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .input-dark { background: #1e293b; border: 1px solid #334155; padding: 8px; border-radius: 6px; outline: none; width: 100%; font-size: 12px; color: white; }
        .btn-blue { background: #3b82f6; padding: 8px; border-radius: 6px; font-weight: bold; width: 100%; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .btn-blue:hover { opacity: 0.8; }
        .hidden { display: none; }
        .cat-link { display: flex; align-items: center; padding: 8px 12px; border-radius: 8px; font-size: 13px; transition: 0.2s; color: #94a3b8; cursor: pointer; }
        .cat-link:hover, .cat-link.active { background: #1e293b; color: #3b82f6; }
    </style>
</head>
<body>

    <button id="openSidebar" onclick="toggleSidebar()" class="fixed left-4 top-4 bg-blue-600 p-2 rounded-lg z-[90] hidden"><i class="fas fa-bars"></i></button>

    <aside class="sidebar shadow-2xl" id="sidebar">
        <div class="p-4 flex justify-between items-center border-b border-slate-800">
            <h1 class="text-xl font-black text-blue-500 tracking-tighter">BOFISBU</h1>
            <button onclick="toggleSidebar()" class="text-slate-500 hover:text-white"><i class="fas fa-times"></i></button>
        </div>

        <div id="auth-section" class="p-4 border-b border-slate-800">
            <div class="flex justify-between mb-3 text-[10px] font-bold uppercase">
                <button onclick="setAuthMode('login')" id="tab-login" class="text-blue-500 border-b border-blue-500">Login</button>
                <button onclick="setAuthMode('reg')" id="tab-reg" class="text-slate-500">Register</button>
            </div>
            <div class="space-y-2">
                <input type="text" id="sideU" placeholder="User..." class="input-dark">
                <input type="password" id="sideP" placeholder="Pass..." class="input-dark">
                <button onclick="handleSideAuth()" class="btn-blue">XÁC NHẬN</button>
            </div>
        </div>

        <div id="user-section" class="p-4 border-b border-slate-800 hidden">
            <p id="userNameDisplay" class="font-bold text-blue-400 text-sm truncate uppercase"></p>
            <p id="userUID" class="text-[10px] text-yellow-500 font-mono mb-2"></p>
            <div class="bg-slate-900/50 p-2 rounded text-xs flex justify-between border border-slate-700">
                <span class="text-slate-400">Ví:</span> <span id="userCashDisplay" class="text-green-400 font-black">0đ</span>
            </div>
            <button onclick="logout()" class="mt-3 w-full py-1 text-[10px] bg-red-500/10 text-red-400 rounded border border-red-500/20">Đăng xuất</button>
        </div>

        <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
            <p class="px-3 text-[10px] text-slate-500 font-bold uppercase mt-2 mb-1">Danh Mục</p>
            <a onclick="filterCat('all')" class="cat-link active" id="cat-all"><i class="fas fa-border-all w-6"></i> Tất cả</a>
            <a onclick="filterCat('Aimlock')" class="cat-link" id="cat-Aimlock"><i class="fas fa-crosshairs w-6"></i> Aimlock</a>
            <a onclick="filterCat('Data')" class="cat-link" id="cat-Data"><i class="fas fa-database w-6"></i> Data</a>
            <a onclick="filterCat('Menu')" class="cat-link" id="cat-Menu"><i class="fas fa-list w-6"></i> Menu VIP</a>
            <a onclick="filterCat('Panel')" class="cat-link" id="cat-Panel"><i class="fas fa-desktop w-6"></i> Panel</a>
            
            <p class="px-3 text-[10px] text-slate-500 font-bold uppercase mt-4 mb-1">Giao dịch</p>
            <a onclick="showPage('topup')" class="cat-link"><i class="fas fa-wallet w-6"></i> Nạp Tiền</a>
            <a onclick="showPage('history')" class="cat-link"><i class="fas fa-history w-6"></i> Lịch Sử</a>
            
            <div id="adminMenu" class="hidden border-t border-slate-800 mt-4 pt-4">
                <a onclick="showPage('admin')" class="cat-link text-red-400"><i class="fas fa-user-shield w-6"></i> QUẢN TRỊ</a>
            </div>
        </nav>
    </aside>

    <main class="main-content" id="main-content">
        <header class="flex justify-between items-center mb-6">
            <h2 id="pageTitle" class="text-xl font-bold">CỬA HÀNG FILE</h2>
            <div id="headerUID" class="text-[10px] bg-slate-800 px-3 py-1 rounded-full text-slate-400 font-mono">ID: -----</div>
        </header>

        <div id="page-home" class="page-view">
            <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </div>

        <div id="page-topup" class="page-view hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass p-6 rounded-2xl">
                    <h3 class="text-sm font-bold text-orange-400 mb-4 uppercase italic">Nạp Thẻ Auto</h3>
                    <div class="space-y-3">
                        <select id="cardNet" class="input-dark"><option>VIETTEL</option><option>VINAPHONE</option><option>MOBIFONE</option></select>
                        <select id="cardVal" class="input-dark"><option value="10000">10,000đ</option><option value="50000">50,000đ</option><option value="100000">100,000đ</option></select>
                        <input type="text" id="cardSeri" placeholder="Số Seri" class="input-dark">
                        <input type="text" id="cardCode" placeholder="Mã thẻ" class="input-dark">
                        <button onclick="topupNotify()" class="btn-blue bg-orange-600">GỬI THẺ</button>
                    </div>
                </div>
                <div class="glass p-6 rounded-2xl text-center">
                    <h3 class="text-sm font-bold text-blue-400 mb-4 uppercase">Ngân Hàng (Mã KH là Nội Dung)</h3>
                    <img id="bankQR" src="" class="w-44 h-44 rounded-lg border-4 border-white mb-4 bg-white p-1 mx-auto">
                    <div class="text-left bg-slate-900 p-3 rounded-lg text-xs space-y-1">
                        <p>STK: <b class="text-blue-400">1027195845</b></p>
                        <p>Tên: <b>NGUYEN THANH KIEU VA NGUYEN HOANG LONG</b></p>
                        <p>ND: <b id="bankContent" class="text-yellow-400">---</b></p>
                    </div>
                    <button onclick="topupNotify()" class="mt-4 btn-blue bg-green-600">XÁC NHẬN CHUYỂN KHOẢN</button>
                </div>
            </div>
        </div>

        <div id="page-history" class="page-view hidden">
            <div id="historyList" class="space-y-3"></div>
        </div>

        <div id="page-admin" class="page-view hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass p-6 rounded-2xl border border-red-500/20">
                    <h4 class="text-xs font-bold mb-4 uppercase text-red-400">Thêm Sản Phẩm</h4>
                    <div class="space-y-3">
                        <input type="text" id="admPName" placeholder="Tên sản phẩm..." class="input-dark">
                        <input type="number" id="admPPrice" placeholder="Giá..." class="input-dark">
                        <select id="admPCat" class="input-dark">
                            <option value="Aimlock">Aimlock</option><option value="Data">Data</option>
                            <option value="Menu">Menu VIP</option><option value="Panel">Panel</option>
                        </select>
                        <input type="file" id="admPImg" accept="image/*" class="input-dark text-[10px]">
                        <input type="file" id="admPFile" class="input-dark text-[10px]">
                        <button onclick="adminAddProduct()" id="btnPost" class="btn-blue bg-red-600 mt-2">ĐĂNG BÀI</button>
                    </div>
                </div>
                <div class="glass p-6 rounded-2xl border border-green-500/20">
                    <h4 class="text-xs font-bold mb-4 uppercase text-green-400">Quản Lý UID</h4>
                    <div class="space-y-4">
                        <div class="p-3 bg-black/30 rounded">
                            <p class="text-[10px] mb-2 uppercase">Cộng tiền qua UID</p>
                            <input type="text" id="admTargetUIDMoney" placeholder="Mã KH (VD: 1234-ABCD)" class="input-dark mb-2">
                            <input type="number" id="admAmountMoney" placeholder="Số tiền..." class="input-dark mb-2">
                            <button onclick="adminAddMoneyByUID()" class="btn-blue bg-green-600">CỘNG TIỀN</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- DATA PERSISTENCE ---
        let users = JSON.parse(localStorage.getItem('b_users_final')) || [
            { user: 'admin', pass: 'admin', role: 'admin', cash: 0, uid: '2026-ADMIN', history: [] }
        ];
        let products = JSON.parse(localStorage.getItem('b_products_final')) || [];
        let currentUser = JSON.parse(localStorage.getItem('curr_u_final')) || null;
        let currentFilter = 'all';

        window.onload = () => { updateUI(); renderProducts(); renderHistory(); };

        function syncData() {
            localStorage.setItem('b_users_final', JSON.stringify(users));
            localStorage.setItem('b_products_final', JSON.stringify(products));
            if(currentUser) localStorage.setItem('curr_u_final', JSON.stringify(currentUser));
            else localStorage.removeItem('curr_u_final');
        }

        function updateUI() {
            const aSec = document.getElementById('auth-section');
            const uSec = document.getElementById('user-section');
            const admM = document.getElementById('adminMenu');
            if(currentUser) {
                // Luôn tìm lại thông tin mới nhất từ mảng users trước khi hiển thị
                const freshData = users.find(u => u.user === currentUser.user);
                if(freshData) currentUser = freshData;

                aSec.classList.add('hidden'); uSec.classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = currentUser.user;
                document.getElementById('userUID').innerText = "Mã KH: " + currentUser.uid;
                document.getElementById('headerUID').innerText = "ID: " + currentUser.uid;
                document.getElementById('userCashDisplay').innerText = currentUser.cash.toLocaleString() + "đ";
                document.getElementById('bankContent').innerText = currentUser.uid;
                document.getElementById('bankQR').src = `https://img.vietqr.io/image/VCB-1027195845-compact2.png?amount=0&addInfo=${currentUser.uid}&accountName=NGUYEN%20HOANG%20LONG`;
                if(currentUser.role === 'admin') admM.classList.remove('hidden');
            } else {
                aSec.classList.remove('hidden'); uSec.classList.add('hidden'); admM.classList.add('hidden');
            }
        }

        // --- AUTH ---
        let authMode = 'login';
        function setAuthMode(m) {
            authMode = m;
            document.getElementById('tab-login').className = m === 'login' ? 'text-blue-500 border-b border-blue-500' : 'text-slate-500';
            document.getElementById('tab-reg').className = m === 'reg' ? 'text-blue-500 border-b border-blue-500' : 'text-slate-500';
        }

        function handleSideAuth() {
            const u = document.getElementById('sideU').value.trim();
            const p = document.getElementById('sideP').value.trim();
            if(!u || !p) return alert("Vui lòng điền đủ!");

            if(authMode === 'reg') {
                if(users.find(x => x.user === u)) return alert("Tài khoản đã tồn tại!");
                const uid = Math.floor(1000 + Math.random() * 9000) + '-' + Math.random().toString(36).substring(2, 6).toUpperCase();
                const newUser = { user: u, pass: p, role: 'user', cash: 0, uid, history: [] };
                users.push(newUser);
                syncData();
                alert("Đăng ký thành công! Hãy đăng nhập.");
                setAuthMode('login');
            } else {
                const found = users.find(x => x.user === u && x.pass === p);
                if(found) { 
                    currentUser = found; 
                    syncData(); 
                    updateUI(); 
                    alert("Đăng nhập thành công!"); 
                } else alert("Sai tài khoản hoặc mật khẩu!");
            }
        }

        function logout() { currentUser = null; syncData(); location.reload(); }

        // --- CORE LOGIC ---
        function adminAddMoneyByUID() {
            const uid = document.getElementById('admTargetUIDMoney').value.trim();
            const amt = parseInt(document.getElementById('admAmountMoney').value);
            if(!uid || isNaN(amt)) return alert("Nhập đủ UID và số tiền!");

            let uIdx = users.findIndex(x => x.uid === uid);
            if(uIdx !== -1) {
                users[uIdx].cash += amt;
                syncData();
                updateUI();
                alert("Đã cộng " + amt.toLocaleString() + "đ cho ID: " + uid);
            } else alert("Không tìm thấy UID!");
        }

        function buyProduct(id) {
            if(!currentUser) return alert("Hãy đăng nhập!");
            const p = products.find(x => x.id === id);
            const qty = prompt(`Mua ${p.name}. Nhập số lượng:`, "1");
            if(!qty) return;
            const total = p.price * parseInt(qty);
            
            if(currentUser.cash < total) return alert("Số dư không đủ!");

            if(confirm(`Thanh toán ${total.toLocaleString()}đ?`)) {
                // Cập nhật số dư
                currentUser.cash -= total;
                currentUser.history.unshift({ name: p.name, total, date: new Date().toLocaleString(), file: p.file });
                
                // Đồng bộ vào mảng users tổng
                let uIdx = users.findIndex(x => x.user === currentUser.user);
                users[uIdx] = currentUser;
                
                syncData();
                updateUI();
                renderHistory();
                alert("Mua thành công!");
            }
        }

        // --- UTILS ---
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('closed');
            document.getElementById('main-content').classList.toggle('full');
            document.getElementById('openSidebar').classList.toggle('hidden');
        }

        function showPage(id) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + id).classList.remove('hidden');
            if(window.innerWidth < 768) toggleSidebar();
        }

        function filterCat(cat) {
            currentFilter = cat; showPage('home');
            document.querySelectorAll('.cat-link').forEach(l => l.classList.remove('active'));
            if(document.getElementById('cat-'+cat)) document.getElementById('cat-'+cat).classList.add('active');
            renderProducts();
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result); reader.onerror = e => reject(e);
        });

        async function adminAddProduct() {
            const name = document.getElementById('admPName').value;
            const price = parseInt(document.getElementById('admPPrice').value);
            const cat = document.getElementById('admPCat').value;
            const img = document.getElementById('admPImg').files[0];
            const zip = document.getElementById('admPFile').files[0];
            if(!name || isNaN(price) || !img || !zip) return alert("Nhập đủ thông tin!");
            
            document.getElementById('btnPost').innerText = "ĐANG TẢI...";
            const imgData = await toBase64(img);
            const zipData = await toBase64(zip);
            products.unshift({ id: Date.now(), name, price, cat, img: imgData, file: zipData });
            syncData(); renderProducts(); alert("Đã đăng!"); location.reload();
        }

        function renderProducts() {
            const g = document.getElementById('productGrid');
            const list = currentFilter === 'all' ? products : products.filter(p => p.cat === currentFilter);
            g.innerHTML = list.map(p => `
                <div class="glass p-3 rounded-xl border border-slate-800">
                    <img src="${p.img}" class="w-full h-32 object-cover rounded-lg mb-2">
                    <h3 class="font-bold text-xs truncate">${p.name}</h3>
                    <p class="text-green-400 font-bold">${p.price.toLocaleString()}đ</p>
                    <button onclick="buyProduct(${p.id})" class="w-full mt-2 py-1.5 bg-blue-600 rounded text-[10px] font-bold">MUA NGAY</button>
                </div>
            `).join('');
        }

        function renderHistory() {
            const h = document.getElementById('historyList');
            if(!currentUser || currentUser.history.length === 0) return h.innerHTML = "<p class='text-center opacity-50'>Chưa có lịch sử.</p>";
            h.innerHTML = currentUser.history.map(item => `
                <div class="glass p-4 rounded-xl flex justify-between items-center border-l-4 border-blue-500">
                    <div class="text-xs"><b>${item.name}</b><br><span class="opacity-50">${item.date}</span></div>
                    <a href="${item.file}" download="bofisbu_file.zip" class="bg-green-600 px-3 py-1.5 rounded text-[10px] font-bold">TẢI FILE</a>
                </div>
            `).join('');
        }

        function topupNotify() { alert("Đã gửi! Vui lòng đợi Admin kiểm tra mã KH của bạn."); }
    </script>
</body>
</html>
