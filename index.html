<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bofisbu.shopfile.site | v3.0 Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap');
        body { font-family: 'Lexend', sans-serif; background-color: #0b0f1a; color: #e2e8f0; }
        .sidebar { width: 220px; background: #111827; height: 100vh; position: fixed; left: 0; top: 0; border-right: 1px solid #1f2937; z-index: 100; transition: 0.3s; display: flex; flex-direction: column; }
        .sidebar.closed { left: -220px; }
        .main-content { margin-left: 220px; padding: 20px; transition: 0.3s; }
        .main-content.full { margin-left: 0; }
        .glass { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .input-dark { background: #1f2937; border: 1px solid #374151; padding: 8px; border-radius: 6px; outline: none; width: 100%; font-size: 12px; }
        .btn-blue { background: #2563eb; padding: 8px; border-radius: 6px; font-weight: bold; width: 100%; font-size: 13px; }
        .hidden { display: none; }
        #openSidebar { position: fixed; left: 10px; top: 10px; z-index: 90; }
    </style>
</head>
<body>

    <button id="openSidebar" onclick="toggleSidebar()" class="bg-blue-600 p-2 rounded-lg hidden"><i class="fas fa-bars"></i></button>

    <aside class="sidebar shadow-2xl" id="sidebar">
        <div class="p-4 flex justify-between items-center border-b border-gray-800">
            <h1 class="text-lg font-black text-blue-500">BOFISBU</h1>
            <button onclick="toggleSidebar()" class="text-gray-500 hover:text-white"><i class="fas fa-times"></i></button>
        </div>

        <div id="auth-section" class="p-4 border-b border-gray-800">
            <div class="flex justify-between mb-3 text-[10px] font-bold uppercase">
                <button onclick="setAuthMode('login')" id="tab-login" class="text-blue-500 border-b border-blue-500">Login</button>
                <button onclick="setAuthMode('reg')" id="tab-reg" class="text-gray-500">Register</button>
            </div>
            <div class="space-y-2">
                <input type="text" id="sideU" placeholder="User..." class="input-dark">
                <input type="password" id="sideP" placeholder="Pass..." class="input-dark">
                <button onclick="handleSideAuth()" class="btn-blue">XÁC NHẬN</button>
            </div>
        </div>

        <div id="user-section" class="p-4 border-b border-gray-800 hidden">
            <p id="userNameDisplay" class="font-bold text-blue-400 text-sm truncate"></p>
            <p id="userUID" class="text-[9px] text-gray-500 mb-2"></p>
            <div class="bg-black/30 p-2 rounded text-xs flex justify-between">
                <span>Ví:</span> <span id="userCashDisplay" class="text-green-500 font-bold">0đ</span>
            </div>
            <button onclick="logout()" class="mt-3 w-full py-1 text-[10px] bg-red-500/10 text-red-400 rounded border border-red-500/20">Thoát</button>
        </div>

        <nav class="flex-1 p-2 space-y-1">
            <a href="#" onclick="showPage('home')" class="flex items-center p-2 hover:bg-gray-800 rounded text-sm"><i class="fas fa-home w-6 text-blue-400"></i> Home</a>
            <a href="#" onclick="showPage('topup')" class="flex items-center p-2 hover:bg-gray-800 rounded text-sm"><i class="fas fa-wallet w-6 text-orange-400"></i> Nạp Tiền</a>
            <a href="#" onclick="showPage('history')" class="flex items-center p-2 hover:bg-gray-800 rounded text-sm"><i class="fas fa-shopping-cart w-6 text-purple-400"></i> Lịch Sử Mua</a>
            <div id="adminMenu" class="hidden pt-4">
                <p class="px-2 text-[9px] text-red-500 font-bold uppercase mb-1">Admin</p>
                <a href="#" onclick="showPage('admin')" class="flex items-center p-2 bg-red-500/5 hover:bg-red-500/10 rounded text-sm text-red-500 border border-red-500/10">
                    <i class="fas fa-user-shield w-6"></i> Quản Trị
                </a>
            </div>
        </nav>
    </aside>

    <main class="main-content" id="main-content">
        <div id="page-home" class="page-view">
            <h2 class="text-xl font-bold mb-6 flex items-center"><i class="fas fa-star text-yellow-500 mr-2"></i> DANH SÁCH SẢN PHẨM</h2>
            <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </div>

        <div id="page-topup" class="page-view hidden">
            <h2 class="text-xl font-bold mb-6">NẠP TIỀN TỰ ĐỘNG</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass p-5 rounded-xl">
                    <h3 class="text-sm font-bold text-orange-500 mb-4 uppercase italic">Nạp Thẻ (Autocard1s)</h3>
                    <div class="space-y-3">
                        <select id="cardNet" class="input-dark"><option value="VIETTEL">Viettel</option><option value="VINAPHONE">Vinaphone</option></select>
                        <select id="cardVal" class="input-dark"><option value="10000">10,000đ</option><option value="50000">50,000đ</option></select>
                        <input type="text" id="cardSeri" placeholder="Seri" class="input-dark">
                        <input type="text" id="cardCode" placeholder="Mã thẻ" class="input-dark">
                        <button onclick="topupNotify()" class="btn-blue bg-orange-600">GỬI THẺ</button>
                    </div>
                </div>
                <div class="glass p-5 rounded-xl text-center">
                    <h3 class="text-sm font-bold text-blue-400 mb-4 uppercase">Chuyển khoản (MB Bank)</h3>
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=0348609562" class="mx-auto mb-4 border border-white">
                    <p class="text-xs">STK: <b>0348609562</b></p>
                    <button onclick="topupNotify()" class="mt-4 btn-blue bg-green-600">TÔI ĐÃ CHUYỂN TIỀN</button>
                </div>
            </div>
        </div>

        <div id="page-history" class="page-view hidden">
            <h2 class="text-xl font-bold mb-6">SẢN PHẨM ĐÃ MUA</h2>
            <div id="historyList" class="space-y-3"></div>
        </div>

        <div id="page-admin" class="page-view hidden">
            <h2 class="text-xl font-bold mb-6 text-red-500 uppercase">Quản trị hệ thống</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass p-5 rounded-xl">
                    <h4 class="text-xs font-bold mb-3 uppercase">Thêm Sản Phẩm & Tệp</h4>
                    <div class="space-y-2">
                        <input type="text" id="admPName" placeholder="Tên sản phẩm" class="input-dark">
                        <input type="number" id="admPPrice" placeholder="Giá tiền" class="input-dark">
                        <input type="text" id="admPFile" placeholder="Link Tệp / File tải về" class="input-dark">
                        <input type="text" id="admPImg" placeholder="Link ảnh minh họa" class="input-dark">
                        <button onclick="adminAddProduct()" class="btn-blue bg-red-600">ĐĂNG SẢN PHẨM</button>
                    </div>
                </div>
                <div class="glass p-5 rounded-xl">
                    <h4 class="text-xs font-bold mb-3 uppercase">Quản lý Tài Khoản</h4>
                    <div class="space-y-4">
                        <div>
                            <p class="text-[10px] mb-1">Cộng tiền (User Name):</p>
                            <div class="flex gap-2">
                                <input type="text" id="admTargetUser" class="input-dark" placeholder="Username...">
                                <input type="number" id="admAmount" class="input-dark w-1/3" placeholder="Số tiền">
                                <button onclick="adminAddMoney()" class="bg-green-600 px-3 rounded text-xs font-bold">OK</button>
                            </div>
                        </div>
                        <div class="pt-4 border-t border-gray-800">
                            <p class="text-[10px] mb-1">Thêm Admin (Qua mã khách hàng):</p>
                            <div class="flex gap-2">
                                <input type="text" id="admTargetUID" class="input-dark" placeholder="Ví dụ: 1234-ABCD">
                                <button onclick="adminSetAdmin()" class="bg-blue-600 px-3 rounded text-xs font-bold">SET ADMIN</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- DỮ LIỆU ---
        let users = JSON.parse(localStorage.getItem('b_users')) || [
            { user: 'bofisbudevshop', pass: 'shopbofisbu2000', role: 'admin', cash: 0, uid: '2026-ADMIN', history: [] }
        ];
        let products = JSON.parse(localStorage.getItem('b_products')) || [];
        let currentUser = JSON.parse(localStorage.getItem('curr_u')) || null;
        let authMode = 'login';

        window.onload = () => { updateUI(); renderProducts(); renderHistory(); };

        // --- HỆ THỐNG UID ---
        function generateUID() {
            const num = Math.floor(1000 + Math.random() * 9000);
            const str = Math.random().toString(36).substring(2, 6).toUpperCase();
            return `${num}-${str}`;
        }

        // --- GIAO DIỆN ---
        function toggleSidebar() {
            const side = document.getElementById('sidebar');
            const main = document.getElementById('main-content');
            const btn = document.getElementById('openSidebar');
            side.classList.toggle('closed');
            main.classList.toggle('full');
            btn.classList.toggle('hidden');
        }

        function showPage(id) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + id).classList.remove('hidden');
            if(window.innerWidth < 768) toggleSidebar();
        }

        function updateUI() {
            const aSec = document.getElementById('auth-section');
            const uSec = document.getElementById('user-section');
            const admM = document.getElementById('adminMenu');
            if(currentUser) {
                aSec.classList.add('hidden');
                uSec.classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = currentUser.user;
                document.getElementById('userUID').innerText = "Mã KH: " + currentUser.uid;
                document.getElementById('userCashDisplay').innerText = currentUser.cash.toLocaleString() + "đ";
                if(currentUser.role === 'admin') admM.classList.remove('hidden');
            } else {
                aSec.classList.remove('hidden');
                uSec.classList.add('hidden');
                admM.classList.add('hidden');
            }
        }

        // --- AUTH ---
        function setAuthMode(m) {
            authMode = m;
            document.getElementById('tab-login').className = m === 'login' ? 'text-blue-500 border-b border-blue-500' : 'text-gray-500';
            document.getElementById('tab-reg').className = m === 'reg' ? 'text-blue-500 border-b border-blue-500' : 'text-gray-500';
        }

        function handleSideAuth() {
            const u = document.getElementById('sideU').value;
            const p = document.getElementById('sideP').value;
            if(!u || !p) return alert("Nhập đủ thông tin!");

            if(authMode === 'reg') {
                if(users.find(x => x.user === u)) return alert("Tên này đã có người dùng!");
                const newU = { user: u, pass: p, role: 'user', cash: 0, uid: generateUID(), history: [] };
                users.push(newU);
                saveData();
                alert("Đăng ký thành công! Hãy đăng nhập.");
                setAuthMode('login');
            } else {
                const f = users.find(x => x.user === u && x.pass === p);
                if(f) {
                    currentUser = f;
                    saveData();
                    alert("Đăng nhập thành công!");
                    updateUI();
                } else { alert("Sai tài khoản/mật khẩu!"); }
            }
        }

        function logout() { localStorage.removeItem('curr_u'); location.reload(); }

        // --- MUA HÀNG ---
        function buyProduct(idx) {
            if(!currentUser) return alert("Vui lòng đăng nhập để mua!");
            const p = products[idx];
            const qty = prompt(`Sản phẩm: ${p.name}\nGiá: ${p.price.toLocaleString()}đ\nNhập số lượng muốn mua:`, "1");
            
            if(qty === null) return;
            const num = parseInt(qty);
            if(isNaN(num) || num <= 0) return alert("Số lượng không hợp lệ!");

            const total = p.price * num;
            if(currentUser.cash < total) return alert(`Bạn thiếu ${(total - currentUser.cash).toLocaleString()}đ nữa!`);

            if(confirm(`Tổng thanh toán: ${total.toLocaleString()}đ cho ${num} sản phẩm. Xác nhận mua?`)) {
                currentUser.cash -= total;
                const bill = { 
                    name: p.name, 
                    qty: num, 
                    total: total, 
                    date: new Date().toLocaleString(),
                    file: p.file 
                };
                currentUser.history.unshift(bill);
                
                // Cập nhật vào danh sách users tổng
                let userIdx = users.findIndex(x => x.user === currentUser.user);
                users[userIdx] = currentUser;
                
                saveData();
                updateUI();
                renderHistory();
                alert("Mua hàng thành công! Kiểm tra trong Lịch sử mua.");
            }
        }

        // --- ADMIN ---
        function adminAddProduct() {
            const name = document.getElementById('admPName').value;
            const price = parseInt(document.getElementById('admPPrice').value);
            const file = document.getElementById('admPFile').value;
            const img = document.getElementById('admPImg').value || 'https://via.placeholder.com/150';

            if(!name || isNaN(price) || !file) return alert("Vui lòng nhập Tên, Giá và Tệp!");
            products.push({ name, price, file, img });
            saveData();
            renderProducts();
            alert("Đã đăng sản phẩm!");
        }

        function adminAddMoney() {
            const u = document.getElementById('admTargetUser').value;
            const amt = parseInt(document.getElementById('admAmount').value);
            let user = users.find(x => x.user === u);
            if(user && !isNaN(amt)) {
                user.cash += amt;
                if(currentUser.user === u) currentUser.cash = user.cash;
                saveData();
                updateUI();
                alert("Đã cộng tiền!");
            }
        }

        function adminSetAdmin() {
            const uid = document.getElementById('admTargetUID').value;
            let user = users.find(x => x.uid === uid);
            if(user) {
                user.role = 'admin';
                saveData();
                alert(`Đã nâng cấp [${user.user}] lên Admin!`);
            } else { alert("Không tìm thấy mã khách hàng này!"); }
        }

        // --- NẠP TIỀN ---
        function topupNotify() {
            if(!currentUser) return alert("Đăng nhập đã bạn ơi!");
            alert("Nạp tiền thành công! Vui lòng đợi shop kiểm tra và cộng tiền sau 3-5 phút.");
        }

        // --- RENDER ---
        function renderProducts() {
            const g = document.getElementById('productGrid');
            g.innerHTML = products.map((p, i) => `
                <div class="glass p-3 rounded-xl border border-gray-800">
                    <img src="${p.img}" class="w-full h-32 object-cover rounded mb-2">
                    <h3 class="font-bold text-xs truncate">${p.name}</h3>
                    <p class="text-green-500 font-bold text-sm my-1">${p.price.toLocaleString()}đ</p>
                    <button onclick="buyProduct(${i})" class="w-full py-1.5 bg-blue-600 rounded text-[10px] font-bold">MUA NGAY</button>
                </div>
            `).join('');
        }

        function renderHistory() {
            const h = document.getElementById('historyList');
            if(!currentUser || currentUser.history.length === 0) {
                h.innerHTML = "<p class='text-gray-500 text-xs italic text-center'>Bạn chưa mua sản phẩm nào.</p>";
                return;
            }
            h.innerHTML = currentUser.history.map(item => `
                <div class="glass p-4 rounded-xl flex justify-between items-center border-l-4 border-purple-500">
                    <div>
                        <h4 class="font-bold text-sm">${item.name} <span class="text-gray-500 font-normal">(x${item.qty})</span></h4>
                        <p class="text-[10px] text-gray-500">${item.date}</p>
                    </div>
                    <a href="${item.file}" target="_blank" class="bg-green-600 px-4 py-2 rounded text-xs font-bold"><i class="fas fa-download mr-1"></i> TẢI TỀP</a>
                </div>
            `).join('');
        }

        function saveData() {
            localStorage.setItem('b_users', JSON.stringify(users));
            localStorage.setItem('b_products', JSON.stringify(products));
            if(currentUser) localStorage.setItem('curr_u', JSON.stringify(currentUser));
        }
    </script>
</body>
</html>
