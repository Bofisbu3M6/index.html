<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bofisbu.shopfile.site | v5.6 Autocard1s Partner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap');
        body { font-family: 'Lexend', sans-serif; background-color: #0b1120; color: #e2e8f0; }
        .sidebar { width: 230px; background: #0f172a; height: 100vh; position: fixed; left: 0; top: 0; border-right: 1px solid #1e293b; z-index: 100; transition: 0.3s; display: flex; flex-direction: column; }
        .sidebar.closed { left: -230px; }
        .main-content { margin-left: 230px; padding: 20px; transition: 0.3s; }
        .main-content.full { margin-left: 0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .input-dark { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 8px; outline: none; width: 100%; font-size: 12px; color: white; }
        .btn-blue { background: #3b82f6; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .cat-link { display: flex; align-items: center; padding: 10px 14px; border-radius: 10px; font-size: 13px; transition: 0.2s; color: #94a3b8; cursor: pointer; margin-bottom: 2px; }
        .cat-link:hover, .cat-link.active { background: #1e293b; color: #3b82f6; }
        .status-success { color: #4ade80; background: rgba(74, 222, 128, 0.1); padding: 2px 6px; border-radius: 4px; }
        .status-fail { color: #f87171; background: rgba(248, 113, 113, 0.1); padding: 2px 6px; border-radius: 4px; }
        .status-pending { color: #fbbf24; background: rgba(251, 191, 36, 0.1); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

    <button id="openSidebar" onclick="toggleSidebar()" class="fixed left-4 top-4 bg-blue-600 p-2 rounded-lg z-[90] hidden"><i class="fas fa-bars"></i></button>

    <aside class="sidebar shadow-2xl" id="sidebar">
        <div class="p-5 flex justify-between items-center border-b border-slate-800">
            <h1 class="text-xl font-black text-blue-500 italic">BOFISBU</h1>
            <button onclick="toggleSidebar()" class="text-slate-500 hover:text-white"><i class="fas fa-times"></i></button>
        </div>

        <div id="auth-section" class="p-4 border-b border-slate-800">
            <input type="text" id="sideU" placeholder="Tên đăng nhập..." class="input-dark mb-2">
            <input type="password" id="sideP" placeholder="Mật khẩu..." class="input-dark mb-2">
            <button onclick="handleSideAuth()" class="btn-blue w-full uppercase">Vào cửa hàng</button>
        </div>

        <div id="user-section" class="p-4 border-b border-slate-800 hidden">
            <div class="flex items-center space-x-3 mb-3">
                <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold text-white uppercase" id="avatarChar">?</div>
                <div>
                    <p id="userNameDisplay" class="font-bold text-sm truncate w-24 uppercase"></p>
                    <p id="userUID" class="text-[9px] text-yellow-500 font-mono"></p>
                </div>
            </div>
            <div class="bg-slate-900/80 p-2.5 rounded-lg text-xs flex justify-between border border-slate-700">
                <span class="text-slate-400">Số dư:</span> <span id="userCashDisplay" class="text-green-400 font-black">0đ</span>
            </div>
            <button onclick="logout()" class="mt-3 w-full py-1.5 text-[10px] bg-red-500/10 text-red-400 rounded-md border border-red-500/20">ĐĂNG XUẤT</button>
        </div>

        <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
            <a onclick="showPage('home')" class="cat-link active" id="cat-all"><i class="fas fa-home w-6"></i> Trang Chủ</a>
            <a onclick="showPage('topup')" class="cat-link"><i class="fas fa-wallet w-6"></i> Nạp Tiền</a>
            <a onclick="showPage('cardHistory')" class="cat-link"><i class="fas fa-receipt w-6"></i> Lịch Sử Thẻ</a>
            <a onclick="showPage('history')" class="cat-link"><i class="fas fa-shopping-bag w-6"></i> Đã Mua</a>
            
            <div id="adminMenu" class="hidden border-t border-slate-800 mt-4 pt-4">
                <a onclick="showPage('admin')" class="cat-link text-red-400 font-bold"><i class="fas fa-user-shield w-6"></i> QUẢN TRỊ</a>
            </div>
        </nav>
        
        <div class="p-4 border-t border-slate-800 bg-slate-900/50">
            <p class="text-[8px] text-slate-500 uppercase font-bold mb-1">Partner Account</p>
            <p class="text-[10px] text-orange-400 font-mono truncate">ID: Bofisbudevshop</p>
        </div>
    </aside>

    <main class="main-content" id="main-content">
        <header class="flex justify-between items-center mb-8">
            <h2 id="pageTitle" class="text-2xl font-bold tracking-tight">CỬA HÀNG FILE</h2>
            <div id="headerUID" class="text-[11px] bg-slate-800/80 px-4 py-2 rounded-xl text-blue-400 border border-slate-700 font-mono">ID: -----</div>
        </header>

        <div id="page-home" class="page-view">
            <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>

        <div id="page-topup" class="page-view hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass p-8 rounded-3xl border border-blue-500/10">
                    <div class="flex items-center space-x-3 mb-6">
                        <img src="https://autocard1s.com/favicon.ico" class="w-6 h-6 rounded">
                        <h3 class="font-bold text-lg">Nạp thẻ Auto (Autocard1s)</h3>
                    </div>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <select id="cardNet" class="input-dark"><option>VIETTEL</option><option>VINAPHONE</option><option>MOBIFONE</option></select>
                            <select id="cardVal" class="input-dark"><option value="10000">10,000đ</option><option value="50000">50,000đ</option><option value="100000">100,000đ</option></select>
                        </div>
                        <input type="text" id="cardSeri" placeholder="Số Seri" class="input-dark">
                        <input type="text" id="cardCode" placeholder="Mã thẻ (PIN)" class="input-dark">
                        <button onclick="handleCardTopup()" class="btn-blue w-full py-3">GỬI THẺ DUYỆT</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-cardHistory" class="page-view hidden">
            <div class="glass rounded-2xl overflow-x-auto border border-slate-800">
                <table class="w-full text-left text-xs">
                    <thead class="bg-slate-800 text-slate-400 uppercase font-bold">
                        <tr><th class="p-4">Ngày</th><th class="p-4">Loại</th><th class="p-4">Seri/Mã</th><th class="p-4">Mệnh giá</th><th class="p-4">Trạng thái</th></tr>
                    </thead>
                    <tbody id="cardLogList"></tbody>
                </table>
            </div>
        </div>

        <div id="page-history" class="page-view hidden"><div id="historyList" class="grid gap-4"></div></div>

        <div id="page-admin" class="page-view hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass p-6 rounded-2xl border border-red-500/20">
                    <h4 class="text-xs font-bold mb-4 uppercase text-red-400">Đăng Sản Phẩm</h4>
                    <div class="space-y-3">
                        <input type="text" id="admPName" placeholder="Tên file..." class="input-dark">
                        <input type="number" id="admPPrice" placeholder="Giá tiền..." class="input-dark">
                        <select id="admPCat" class="input-dark"><option value="Aimlock">Aimlock</option><option value="Data">Data</option><option value="Menu">Menu VIP</option><option value="Panel">Panel</option></select>
                        <input type="file" id="admPImg" accept="image/*" class="input-dark">
                        <input type="file" id="admPFile" class="input-dark">
                        <button onclick="adminAddProduct()" class="btn-blue bg-red-600">ĐĂNG FILE</button>
                    </div>
                </div>
                <div class="glass p-6 rounded-2xl border border-green-500/20">
                    <h4 class="text-xs font-bold mb-4 text-green-400">Cộng Tiền UID</h4>
                    <input type="text" id="admTargetUID" placeholder="Mã UID..." class="input-dark mb-2">
                    <input type="number" id="admAmount" placeholder="Số tiền..." class="input-dark mb-2">
                    <button onclick="adminAddMoney()" class="btn-blue bg-green-600">CỘNG TIỀN</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- CONFIG ---
        const PARTNER_USER = "Bofisbudevshop";
        const ADMIN_USER = "Bofisbudevshop";
        const ADMIN_PASS = "shopdevnguyenlong";

        let users = JSON.parse(localStorage.getItem('b_v56_u')) || [
            { user: ADMIN_USER, pass: ADMIN_PASS, role: 'admin', cash: 0, uid: 'ADMIN-MASTER', history: [], cardLogs: [] }
        ];
        let products = JSON.parse(localStorage.getItem('b_v56_p')) || [];
        let currentUser = JSON.parse(localStorage.getItem('b_v56_s')) || null;

        window.onload = () => { updateUI(); renderProducts(); renderHistory(); renderCardLogs(); };

        function sync() {
            localStorage.setItem('b_v56_u', JSON.stringify(users));
            localStorage.setItem('b_v56_p', JSON.stringify(products));
            if(currentUser) localStorage.setItem('b_v56_s', JSON.stringify(currentUser));
            else localStorage.removeItem('b_v56_s');
        }

        // --- CARD LOGIC ---
        function handleCardTopup() {
            if(!currentUser) return alert("Vui lòng đăng nhập!");
            const seri = document.getElementById('cardSeri').value.trim();
            const code = document.getElementById('cardCode').value.trim();
            const net = document.getElementById('cardNet').value;
            const val = parseInt(document.getElementById('cardVal').value);

            if(!seri || !code) return alert("Thiếu Seri hoặc Mã thẻ!");

            const btn = document.querySelector('button[onclick="handleCardTopup()"]');
            btn.innerText = "ĐANG GỬI TỚI AUTOCARD1S...";
            btn.disabled = true;

            setTimeout(() => {
                // Giả lập kết nối API với tk Bofisbudevshop
                const isFail = code.endsWith("0"); 
                const status = isFail ? "Sai mệnh giá" : "Thành công";
                
                let uIdx = users.findIndex(u => u.user === currentUser.user);
                if(!users[uIdx].cardLogs) users[uIdx].cardLogs = [];
                
                users[uIdx].cardLogs.unshift({
                    date: new Date().toLocaleString(),
                    net, val, seri, code, status,
                    partner: PARTNER_USER
                });

                if(!isFail) {
                    users[uIdx].cash += val;
                    alert("Hệ thống Autocard1s xác nhận thành công! Tiền đã cộng cho shop.");
                } else {
                    alert("Lỗi Autocard1s: Thẻ sai mệnh giá hoặc tài khoản đối tác không khớp.");
                }

                btn.innerText = "GỬI THẺ DUYỆT";
                btn.disabled = false;
                sync(); updateUI(); renderCardLogs();
            }, 2000);
        }

        function renderCardLogs() {
            const list = document.getElementById('cardLogList');
            if(!currentUser) return;
            const fresh = users.find(u => u.user === currentUser.user);
            const logs = fresh.cardLogs || [];
            list.innerHTML = logs.map(l => `
                <tr class="border-b border-slate-800">
                    <td class="p-4 opacity-50">${l.date}</td>
                    <td class="p-4 font-bold text-blue-400">${l.net}</td>
                    <td class="p-4 font-mono">S: ${l.seri}<br>M: ${l.code.substring(0,4)}****</td>
                    <td class="p-4 font-black text-green-400">${l.val.toLocaleString()}đ</td>
                    <td class="p-4"><span class="${l.status === 'Thành công' ? 'status-success' : 'status-fail'}">${l.status}</span></td>
                </tr>
            `).join('');
        }

        // --- SYSTEM ---
        function updateUI() {
            if(currentUser) {
                const f = users.find(u => u.user === currentUser.user);
                if(f) currentUser = f;
                document.getElementById('user-section').classList.remove('hidden');
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('userNameDisplay').innerText = currentUser.user;
                document.getElementById('userUID').innerText = "UID: " + currentUser.uid;
                document.getElementById('headerUID').innerText = "ID: " + currentUser.uid;
                document.getElementById('userCashDisplay').innerText = currentUser.cash.toLocaleString() + "đ";
                document.getElementById('avatarChar').innerText = currentUser.user.charAt(0);
                if(currentUser.role === 'admin') document.getElementById('adminMenu').classList.remove('hidden');
            } else {
                document.getElementById('user-section').classList.add('hidden');
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('adminMenu').classList.add('hidden');
            }
        }

        function handleSideAuth() {
            const u = document.getElementById('sideU').value.trim();
            const p = document.getElementById('sideP').value.trim();
            if(!u || !p) return;
            const f = users.find(x => x.user === u && x.pass === p);
            if(f) { currentUser = f; sync(); updateUI(); renderCardLogs(); }
            else {
                if(users.find(x => x.user === u)) return alert("Sai pass!");
                const uid = Math.floor(1000+Math.random()*9000)+'-'+Math.random().toString(36).substring(2,5).toUpperCase();
                const role = (u === ADMIN_USER) ? 'admin' : 'user';
                users.push({ user: u, pass: p, role, cash: 0, uid, history: [], cardLogs: [] });
                sync(); handleSideAuth();
            }
        }

        function logout() { currentUser = null; sync(); location.reload(); }

        function showPage(id) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + id).classList.remove('hidden');
            if(window.innerWidth < 768) toggleSidebar();
        }

        function renderProducts() {
            const g = document.getElementById('productGrid');
            g.innerHTML = products.map(p => `
                <div class="glass p-4 rounded-3xl border border-slate-800">
                    <img src="${p.img}" class="w-full h-32 object-cover rounded-2xl mb-3">
                    <h3 class="font-bold text-xs truncate">${p.name}</h3>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-green-400 font-bold">${p.price.toLocaleString()}đ</span>
                        <button onclick="buyProduct(${p.id})" class="bg-blue-600 px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase">Mua</button>
                    </div>
                </div>
            `).join('');
        }

        async function adminAddProduct() {
            const n = document.getElementById('admPName').value;
            const p = parseInt(document.getElementById('admPPrice').value);
            const img = document.getElementById('admPImg').files[0];
            const zip = document.getElementById('admPFile').files[0];
            const toB64 = f => new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); });
            products.unshift({ id: Date.now(), name: n, price: p, img: await toB64(img), file: await toB64(zip) });
            sync(); renderProducts(); alert("Xong!");
        }

        function buyProduct(id) {
            if(!currentUser) return;
            const p = products.find(x => x.id === id);
            if(currentUser.cash < p.price) return alert("Hết tiền!");
            currentUser.cash -= p.price;
            currentUser.history.unshift({ name: p.name, date: new Date().toLocaleString(), file: p.file });
            let i = users.findIndex(u => u.user === currentUser.user);
            users[i] = currentUser; sync(); updateUI(); renderHistory();
        }

        function renderHistory() {
            const h = document.getElementById('historyList');
            if(!currentUser) return;
            h.innerHTML = currentUser.history.map(item => `
                <div class="glass p-4 rounded-2xl border-l-4 border-blue-500 flex justify-between items-center">
                    <span class="text-xs font-bold">${item.name}</span>
                    <a href="${item.file}" download class="bg-green-600 px-3 py-1.5 rounded text-[10px] font-bold">TẢI FILE</a>
                </div>
            `).join('');
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('closed'); document.getElementById('main-content').classList.toggle('full'); document.getElementById('openSidebar').classList.toggle('hidden'); }
    </script>
</body>
</html>
